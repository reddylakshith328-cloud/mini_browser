<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neon Beats</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
    }

    header {
      background-color: #333;
      color: #fff;
      padding: 15px;
      text-align: center;
      font-size: 1.5em;
    }

    nav {
      background-color: #eee;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: #333;
      text-decoration: none;
      margin: 0 12px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
      background-color: #fff;
      margin: 20px auto;
      max-width: 800px;
      border-radius: 6px;
      box-shadow: 0 0 6px rgba(0,0,0,0.1);
    }

    .hero h1 {
      font-size: 2em;
      margin-bottom: 10px;
      color: #444;
    }

    .hero p {
      font-size: 1em;
      color: #555;
    }

    .music-section {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin: 10px;
      padding: 15px;
      width: 220px;
      text-align: center;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 4px;
    }

    .card h3 {
      margin: 10px 0 8px;
      font-size: 1.1em;
      color: #333;
    }

    .card p {
      font-size: 0.9em;
      color: #555;
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: #333;
      color: #fff;
      font-size: 0.9em;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>Music</header>

  <nav>
    <a href="index.html">Home</a>
    <a href="playlists.html">Playlists</a>
    <a href="artists.html">Artists</a>
    <a href="events.html">Events</a>
    <a href="contact.html">Contact</a>
  </nav>

  <section class="hero">
    <h1>Discover Tomorrow’s Sound</h1>
    <p>8D Audios Available</p>
  </section>

  <section class="music-section">
    <div class="card">
     
      <h3>Telugu songs</h3>
      <p>Beats</p>
    </div>
    <div class="card">
      
      <h3>Hindi Songs</h3>
      <p>Beats</p>
    </div>
    <div class="card">
     
      <h3>English Songs</h3>
      <p>beats</p>
    </div>
  </section>

  <footer>
    © 2026 Neon Beats — Built with love for music
  </footer>
</body>
</html>
